<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="Hiragino Sans, Noto Sans JP, Yu Gothic UI, Meiryo, sans-serif">
  <defs>
    <marker id="fa" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#64748b"/>
    </marker>
    <marker id="fa-r" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#dc2626"/>
    </marker>
    <marker id="fa-g" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="480" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>

  <rect x="30" y="30" width="180" height="62" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
  <text x="120" y="55" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e293b">cli.main()</text>
  <text x="120" y="72" font-size="10.5" text-anchor="middle" fill="#475569">docopt でオプション解析</text>
  <text x="120" y="85" font-size="10.5" text-anchor="middle" fill="#475569">ログ初期化（TTY 判定）</text>

  <rect x="250" y="30" width="190" height="62" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="345" y="55" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e293b">Config.load()</text>
  <text x="345" y="72" font-size="10.5" text-anchor="middle" fill="#475569">config.yaml を読み込み</text>
  <text x="345" y="85" font-size="10.5" text-anchor="middle" fill="#475569">config.schema で検証</text>

  <rect x="480" y="30" width="200" height="62" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.4"/>
  <text x="580" y="55" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e293b">Handle 生成</text>
  <text x="580" y="72" font-size="10.5" text-anchor="middle" fill="#475569">ディレクトリ準備・SQLite 接続</text>
  <text x="580" y="85" font-size="10.5" text-anchor="middle" fill="#475569">メタデータからカウンタ復元</text>

  <!-- branch -->
  <path d="M580 92 L580 130" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#fa)"/>
  <rect x="500" y="130" width="160" height="40" rx="20" fill="#ffffff" stroke="#64748b"/>
  <text x="580" y="155" font-size="12" text-anchor="middle" fill="#1e293b">-e（export モード）?</text>

  <!-- fetch path -->
  <rect x="60" y="220" width="560" height="120" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4"/>
  <text x="340" y="243" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">my_lib.selenium_util.with_session_retry（セッションエラー時 最大1回リトライ）</text>

  <rect x="85" y="258" width="230" height="62" rx="8" fill="#ffffff" stroke="#dc2626"/>
  <text x="200" y="281" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">execute_login()</text>
  <text x="200" y="298" font-size="10.5" text-anchor="middle" fill="#475569">LINE 認証経由でメルカリにログイン</text>
  <text x="200" y="311" font-size="10.5" text-anchor="middle" fill="#475569">（my_lib.store.mercari.login）</text>

  <rect x="355" y="258" width="240" height="62" rx="8" fill="#ffffff" stroke="#dc2626"/>
  <text x="475" y="281" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">fetch_order_item_list()</text>
  <text x="475" y="298" font-size="10.5" text-anchor="middle" fill="#475569">シグナルハンドラ設定 → 販売履歴 →</text>
  <text x="475" y="311" font-size="10.5" text-anchor="middle" fill="#475569">購入履歴の順に収集</text>

  <path d="M315 289 L355 289" stroke="#dc2626" stroke-width="1.6" fill="none" marker-end="url(#fa-r)"/>
  <path d="M500 170 L340 220" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#fa)"/>
  <text x="395" y="192" font-size="11" fill="#64748b">No（収集を実行）</text>

  <!-- excel -->
  <rect x="700" y="220" width="210" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
  <text x="805" y="245" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e293b">generate_table_excel()</text>
  <text x="805" y="266" font-size="10.5" text-anchor="middle" fill="#475569">DB から全アイテム取得</text>
  <text x="805" y="281" font-size="10.5" text-anchor="middle" fill="#475569">購入・販売の 2 シート生成</text>
  <text x="805" y="296" font-size="10.5" text-anchor="middle" fill="#475569">サムネイル埋め込み（-N で省略）</text>
  <text x="805" y="311" font-size="10.5" text-anchor="middle" fill="#475569">収集エラー発生時も実行される</text>

  <path d="M660 150 L805 150 L805 220" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#fa)"/>
  <text x="730" y="143" font-size="11" fill="#64748b">Yes（収集スキップ）</text>
  <path d="M620 289 L700 289" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#fa-g)"/>
  <text x="660" y="280" font-size="10.5" text-anchor="middle" fill="#16a34a">quit_selenium 後</text>

  <!-- finish -->
  <rect x="700" y="390" width="210" height="56" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="805" y="413" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e293b">handle.finish()</text>
  <text x="805" y="431" font-size="10.5" text-anchor="middle" fill="#475569">ドライバ終了・プログレス停止・DB クローズ</text>
  <path d="M805 340 L805 390" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#fa)"/>

  <!-- error notes -->
  <rect x="60" y="370" width="560" height="86" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="80" y="392" font-size="12" font-weight="bold" fill="#9a3412">エラー処理（execute() 内で捕捉）</text>
  <text x="80" y="411" font-size="11" fill="#7c2d12">・InvalidSessionIdException / SeleniumError / LoginError → ステータス表示して終了コード 1</text>
  <text x="80" y="428" font-size="11" fill="#7c2d12">・その他の収集例外 → ページダンプ保存後、Excel 生成には進む（終了コード 1）</text>
  <text x="80" y="445" font-size="11" fill="#7c2d12">・シャットダウン要求（SIGINT 等）→ 正常終了扱いで Excel 生成に進む</text>

  <path d="M210 92 L250 61" stroke="none"/>
  <path d="M210 61 L250 61" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#fa)"/>
  <path d="M440 61 L480 61" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#fa)"/>
</svg>
