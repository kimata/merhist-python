<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Hiragino Sans, Noto Sans JP, Yu Gothic UI, Meiryo, sans-serif">
  <defs>
    <marker id="sa" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#64748b"/>
    </marker>
    <marker id="sa-b" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="430" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="24" y="34" font-size="14" font-weight="bold" fill="#1e293b">販売履歴の収集（_fetch_sold_item_list）</text>

  <rect x="30" y="60" width="250" height="72" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="155" y="84" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">① 販売件数の取得</text>
  <text x="155" y="102" font-size="10.5" text-anchor="middle" fill="#475569">ページング表示「全N件」をパース</text>
  <text x="155" y="117" font-size="10.5" text-anchor="middle" fill="#475569">総ページ数 = ceil(N / 20)</text>

  <rect x="330" y="60" width="290" height="72" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="475" y="84" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">② 一覧ページを 1 ページずつ解析</text>
  <text x="475" y="102" font-size="10.5" text-anchor="middle" fill="#475569">テーブル各行から 商品名・価格・手数料・送料・</text>
  <text x="475" y="117" font-size="10.5" text-anchor="middle" fill="#475569">手数料率・回収金額・取引完了日 を抽出</text>

  <rect x="670" y="60" width="240" height="72" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="790" y="84" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">③ 商品 ID の判定</text>
  <text x="790" y="102" font-size="10.5" text-anchor="middle" fill="#475569">order_url の形式から通常メルカリ /</text>
  <text x="790" y="117" font-size="10.5" text-anchor="middle" fill="#475569">メルカリ Shops を判別し ID を抽出</text>

  <path d="M280 96 L330 96" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#sa)"/>
  <path d="M620 96 L670 96" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#sa)"/>

  <!-- per item -->
  <rect x="30" y="175" width="880" height="120" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="470" y="198" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">④ ページ内の各アイテムを処理</text>

  <rect x="55" y="212" width="250" height="66" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="180" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">キャッシュ判定</text>
  <text x="180" y="253" font-size="10.5" text-anchor="middle" fill="#475569">DB に ID が存在 → スキップ（ログのみ）</text>
  <text x="180" y="268" font-size="10.5" text-anchor="middle" fill="#475569">強制モード時は常に再取得</text>

  <rect x="355" y="212" width="250" height="66" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="480" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">_fetch_item_detail()</text>
  <text x="480" y="253" font-size="10.5" text-anchor="middle" fill="#475569">商品説明・取引ページ・サムネイルを取得</text>
  <text x="480" y="268" font-size="10.5" text-anchor="middle" fill="#475569">（詳細は商品詳細取得の図を参照）</text>

  <rect x="655" y="212" width="230" height="66" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="770" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">record_sold_item()</text>
  <text x="770" y="253" font-size="10.5" text-anchor="middle" fill="#475569">SQLite に即時 upsert（1件ごとに保存）</text>
  <text x="770" y="268" font-size="10.5" text-anchor="middle" fill="#475569">→ 中断してもここまでは保持される</text>

  <path d="M305 245 L355 245" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#sa-b)"/>
  <path d="M605 245 L655 245" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#sa-b)"/>
  <path d="M475 132 L470 175" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#sa)"/>

  <!-- stop conditions -->
  <rect x="30" y="330" width="880" height="76" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="50" y="352" font-size="12" font-weight="bold" fill="#9a3412">ループの終了条件</text>
  <text x="50" y="371" font-size="11" fill="#7c2d12">・継続モード時: DB の記録済み件数が総件数に到達 ／ そのページに新規アイテムがない（＝以降は取得済みと判断して打ち切り）</text>
  <text x="50" y="388" font-size="11" fill="#7c2d12">・最終ページに到達 ／ シャットダウン要求（Ctrl+C）を検知（1 ページごと・1 アイテムごとに確認）</text>
  <path d="M470 295 L470 330" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#sa)"/>
</svg>
