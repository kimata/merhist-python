<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="Hiragino Sans, Noto Sans JP, Yu Gothic UI, Meiryo, sans-serif">
  <defs>
    <marker id="da" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#64748b"/>
    </marker>
    <marker id="da-r" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#dc2626"/>
    </marker>
    <marker id="da-g" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#16a34a"/>
    </marker>
    <marker id="da-o" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="480" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="24" y="34" font-size="14" font-weight="bold" fill="#1e293b">商品詳細の取得（_fetch_item_detail）— 最大 3 回リトライ（待機時間は 5 秒 × 試行回数で増加）</text>

  <!-- step 1 -->
  <rect x="30" y="60" width="280" height="130" rx="10" fill="#ffffff" stroke="#64748b"/>
  <text x="170" y="84" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">① 商品説明ページ（別タブで開く）</text>
  <text x="45" y="106" font-size="10.5" fill="#475569">「商品の情報」欄の行を走査して取得:</text>
  <text x="55" y="123" font-size="10.5" fill="#475569">カテゴリー（パンくずリスト）／商品の状態／</text>
  <text x="55" y="138" font-size="10.5" fill="#475569">配送料の負担／発送元の地域／配送の方法</text>
  <text x="45" y="160" font-size="10.5" fill="#b45309">ページが「見つかりません」「削除されました」の</text>
  <text x="45" y="175" font-size="10.5" fill="#b45309">場合は item.error に記録して続行</text>

  <!-- step 2 -->
  <rect x="340" y="60" width="290" height="130" rx="10" fill="#ffffff" stroke="#64748b"/>
  <text x="485" y="84" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">② 取引ページ（ショップ種別で分岐）</text>
  <text x="355" y="106" font-size="11" font-weight="bold" fill="#334155">通常メルカリ（/transaction/…）:</text>
  <text x="365" y="122" font-size="10.5" fill="#475569">購入日時（必須・無ければ形式エラー）／</text>
  <text x="365" y="137" font-size="10.5" fill="#475569">商品代金／配送料（「送料込み」は 0 円扱い）</text>
  <text x="355" y="158" font-size="11" font-weight="bold" fill="#334155">メルカリ Shops（/orders/…）:</text>
  <text x="365" y="174" font-size="10.5" fill="#475569">取引情報欄から価格を取得（購入アイテムのみ）</text>

  <!-- step 3 -->
  <rect x="660" y="60" width="250" height="130" rx="10" fill="#ffffff" stroke="#64748b"/>
  <text x="785" y="84" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1e293b">③ サムネイル保存（3 段階検証）</text>
  <text x="675" y="106" font-size="10.5" fill="#475569">画像 URL を別タブで開き img 要素を</text>
  <text x="675" y="121" font-size="10.5" fill="#475569">スクリーンショットとして PNG 保存</text>
  <text x="675" y="142" font-size="10.5" fill="#475569">検証 1: データが空でないか</text>
  <text x="675" y="157" font-size="10.5" fill="#475569">検証 2: ファイルサイズが 0 でないか</text>
  <text x="675" y="172" font-size="10.5" fill="#475569">検証 3: Pillow の verify() で破損確認</text>

  <path d="M310 125 L340 125" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#da)"/>
  <path d="M630 125 L660 125" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#da)"/>

  <!-- failure (left) -->
  <rect x="30" y="255" width="420" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
  <text x="240" y="281" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#991b1b">失敗（例外発生）</text>
  <text x="240" y="301" font-size="10.5" text-anchor="middle" fill="#991b1b">ページを HTML/PNG でデバッグディレクトリにダンプし、</text>
  <text x="240" y="315" font-size="10.5" text-anchor="middle" fill="#991b1b">待機（5 秒 × 試行回数）後にリトライ</text>

  <!-- success (right) -->
  <rect x="490" y="255" width="420" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
  <text x="700" y="281" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#166534">成功</text>
  <text x="700" y="301" font-size="10.5" text-anchor="middle" fill="#166534">取得結果をログ出力（デバッグ時は全フィールドをダンプ）し、</text>
  <text x="700" y="315" font-size="10.5" text-anchor="middle" fill="#166534">アイテムを返して呼び出し元が DB に upsert</text>

  <!-- arrows -->
  <path d="M785 190 L785 255" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#da-g)"/>
  <text x="800" y="230" font-size="10.5" fill="#16a34a">① 〜 ③ 完了</text>

  <path d="M330 190 L280 255" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#da-r)"/>
  <text x="330" y="230" font-size="10.5" fill="#dc2626">いずれかのステップで例外</text>

  <path d="M120 255 L120 195" stroke="#dc2626" stroke-width="1.6" fill="none" stroke-dasharray="6,4" marker-end="url(#da-r)"/>
  <text x="18" y="230" font-size="10.5" fill="#dc2626">リトライ（最大 3 回）</text>

  <!-- give up -->
  <rect x="30" y="390" width="880" height="66" rx="10" fill="#fff7ed" stroke="#ea580c"/>
  <text x="50" y="414" font-size="12" font-weight="bold" fill="#9a3412">3 回とも失敗した場合</text>
  <text x="50" y="433" font-size="11" fill="#7c2d12">item.error にエラーメッセージを設定したままアイテムを返し、収集全体は継続する（Excel の「エラー」列に出力される）。</text>
  <text x="50" y="448" font-size="11" fill="#7c2d12">ただしページの最初のアイテムで失敗した場合のみ、ページ自体に問題があると判断して HistoryFetchError で収集を停止する。</text>
  <path d="M240 325 L240 390" stroke="#ea580c" stroke-width="1.6" fill="none" marker-end="url(#da-o)"/>
  <text x="255" y="362" font-size="10.5" fill="#ea580c">3 回失敗</text>
</svg>
