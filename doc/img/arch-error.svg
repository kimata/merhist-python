<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" font-family="Hiragino Sans, Noto Sans JP, Yu Gothic UI, Meiryo, sans-serif">
  <defs>
    <marker id="ea" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="420" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>

  <!-- exception hierarchy -->
  <text x="24" y="34" font-size="14" font-weight="bold" fill="#1e293b">カスタム例外の階層（exceptions.py）</text>

  <rect x="180" y="55" width="180" height="40" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4"/>
  <text x="270" y="80" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e293b">MerhisError</text>

  <rect x="30" y="140" width="200" height="52" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="130" y="161" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">PageError（url 付き）</text>
  <text x="130" y="179" font-size="10" text-anchor="middle" fill="#475569">ページ関連エラーの基底</text>

  <rect x="255" y="140" width="160" height="52" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="335" y="161" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">HistoryFetchError</text>
  <text x="335" y="179" font-size="10" text-anchor="middle" fill="#475569">履歴取得の失敗</text>

  <rect x="440" y="140" width="210" height="52" rx="8" fill="#ffffff" stroke="#64748b"/>
  <text x="545" y="161" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">ThumbnailError（path 付き）</text>
  <text x="545" y="179" font-size="10" text-anchor="middle" fill="#475569">サムネイルエラーの基底</text>

  <rect x="30" y="225" width="200" height="66" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="45" y="245" font-size="10.5" fill="#334155">・PageLoadError</text>
  <text x="45" y="261" font-size="10.5" fill="#334155">・InvalidURLFormatError</text>
  <text x="45" y="277" font-size="10.5" fill="#334155">・InvalidPageFormatError</text>

  <rect x="440" y="225" width="210" height="66" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="455" y="245" font-size="10.5" fill="#334155">・ThumbnailEmptyError（データ空）</text>
  <text x="455" y="261" font-size="10.5" fill="#334155">・ThumbnailSizeError（サイズ 0）</text>
  <text x="455" y="277" font-size="10.5" fill="#334155">・ThumbnailCorruptError（破損）</text>

  <path d="M240 95 L140 140" stroke="#64748b" stroke-width="1.4" fill="none" marker-end="url(#ea)"/>
  <path d="M280 95 L330 140" stroke="#64748b" stroke-width="1.4" fill="none" marker-end="url(#ea)"/>
  <path d="M330 95 L520 140" stroke="#64748b" stroke-width="1.4" fill="none" marker-end="url(#ea)"/>
  <path d="M130 192 L130 225" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#ea)"/>
  <path d="M545 192 L545 225" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#ea)"/>

  <!-- retry strategies -->
  <text x="24" y="330" font-size="14" font-weight="bold" fill="#1e293b">リトライ戦略の使い分け</text>
  <rect x="30" y="345" width="280" height="58" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="170" y="366" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1e293b">商品詳細（個別リソース）</text>
  <text x="170" y="384" font-size="10.5" text-anchor="middle" fill="#475569">待機時間を増加（5 秒 × 試行回数）・最大 3 回</text>

  <rect x="330" y="345" width="280" height="58" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="470" y="366" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1e293b">購入履歴一覧（ページ全体）</text>
  <text x="470" y="384" font-size="10.5" text-anchor="middle" fill="#475569">固定間隔（5 秒）・最大 3 回、最終回は再送出</text>

  <rect x="630" y="345" width="280" height="58" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="770" y="366" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1e293b">ブラウザセッション断</text>
  <text x="770" y="384" font-size="10.5" text-anchor="middle" fill="#475569">with_session_retry で最大 1 回、ドライバ再作成</text>

  <!-- side note -->
  <rect x="690" y="55" width="220" height="137" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="800" y="78" font-size="12" font-weight="bold" text-anchor="middle" fill="#9a3412">デバッグダンプ</text>
  <text x="705" y="99" font-size="10.5" fill="#7c2d12">失敗時は my_lib.selenium_util.</text>
  <text x="705" y="114" font-size="10.5" fill="#7c2d12">dump_page でページの HTML と</text>
  <text x="705" y="129" font-size="10.5" fill="#7c2d12">スクリーンショットを debug</text>
  <text x="705" y="144" font-size="10.5" fill="#7c2d12">ディレクトリに保存</text>
  <text x="705" y="165" font-size="10.5" fill="#7c2d12">（商品詳細のリトライ前と、CLI の</text>
  <text x="705" y="180" font-size="10.5" fill="#7c2d12">最上位例外ハンドラの 2 箇所）</text>
</svg>
