<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="Hiragino Sans, Noto Sans JP, Yu Gothic UI, Meiryo, sans-serif">
  <defs>
    <marker id="ba" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#64748b"/>
    </marker>
    <marker id="ba-b" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="440" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="24" y="34" font-size="14" font-weight="bold" fill="#1e293b">購入履歴の収集（_fetch_bought_item_list）— 2 フェーズ構成</text>

  <!-- phase 1 -->
  <rect x="30" y="55" width="880" height="150" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="50" y="78" font-size="12.5" font-weight="bold" fill="#1e293b">フェーズ 1: 一覧の収集（無限スクロール形式・失敗時は固定間隔で最大 3 回リトライ）</text>

  <rect x="55" y="95" width="215" height="90" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="162" y="118" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">リスト項目の読み取り</text>
  <text x="162" y="136" font-size="10.5" text-anchor="middle" fill="#475569">前回の続き（offset）から</text>
  <text x="162" y="151" font-size="10.5" text-anchor="middle" fill="#475569">商品名・注文 URL・購入日時を取得し</text>
  <text x="162" y="166" font-size="10.5" text-anchor="middle" fill="#475569">URL から ID / ショップ種別を判定</text>

  <rect x="320" y="95" width="215" height="90" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="427" y="118" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">キャッシュ判定</text>
  <text x="427" y="136" font-size="10.5" text-anchor="middle" fill="#475569">未取得のアイテムのみ処理対象に追加</text>
  <text x="427" y="151" font-size="10.5" text-anchor="middle" fill="#475569">（強制モード時はキャッシュ済みも追加）</text>
  <text x="427" y="166" font-size="10.5" text-anchor="middle" fill="#475569">継続モードで新規 0 件なら打ち切り</text>

  <rect x="585" y="95" width="300" height="90" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="735" y="118" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">「もっと見る」をクリック</text>
  <text x="735" y="136" font-size="10.5" text-anchor="middle" fill="#475569">ローディングアイコンの消滅を待機（+3 秒）</text>
  <text x="735" y="151" font-size="10.5" text-anchor="middle" fill="#475569">ボタンが無くなったらリスト末尾と判断して終了</text>
  <text x="735" y="166" font-size="10.5" text-anchor="middle" fill="#475569">→ 先頭に戻って続きを読み取り</text>

  <path d="M270 140 L320 140" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#ba-b)"/>
  <path d="M535 140 L585 140" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#ba-b)"/>
  <path d="M735 185 C 735 200, 162 205, 162 185" stroke="#2563eb" stroke-width="1.4" fill="none" stroke-dasharray="6,4" marker-end="url(#ba-b)"/>

  <!-- phase 2 -->
  <rect x="30" y="240" width="880" height="120" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
  <text x="50" y="263" font-size="12.5" font-weight="bold" fill="#1e293b">フェーズ 2: 各アイテムの詳細収集</text>

  <rect x="55" y="280" width="250" height="66" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="180" y="303" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">_fetch_item_detail()</text>
  <text x="180" y="321" font-size="10.5" text-anchor="middle" fill="#475569">商品説明・取引ページ・サムネイル取得</text>
  <text x="180" y="336" font-size="10.5" text-anchor="middle" fill="#475569">（通常 / Shops でページ構造が異なる）</text>

  <rect x="355" y="280" width="250" height="66" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="480" y="303" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">record_bought_item()</text>
  <text x="480" y="321" font-size="10.5" text-anchor="middle" fill="#475569">SQLite に即時 upsert し</text>
  <text x="480" y="336" font-size="10.5" text-anchor="middle" fill="#475569">メタデータ（最終更新時刻等）も保存</text>

  <rect x="655" y="280" width="230" height="66" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="770" y="303" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">プログレス更新</text>
  <text x="770" y="321" font-size="10.5" text-anchor="middle" fill="#475569">1 アイテムごとにシャットダウン要求を</text>
  <text x="770" y="336" font-size="10.5" text-anchor="middle" fill="#475569">確認（Ctrl+C で安全に中断可能）</text>

  <path d="M305 313 L355 313" stroke="#16a34a" stroke-width="1.6" fill="none" marker-end="url(#ba)"/>
  <path d="M605 313 L655 313" stroke="#16a34a" stroke-width="1.6" fill="none" marker-end="url(#ba)"/>
  <path d="M470 205 L470 240" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#ba)"/>

  <rect x="30" y="385" width="880" height="38" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="470" y="409" font-size="11" text-anchor="middle" fill="#7c2d12">販売履歴（ページネーション形式）と異なり、購入履歴は無限スクロール形式のため「一覧を全部集めてから詳細を取る」2 段階方式を採用</text>
</svg>
